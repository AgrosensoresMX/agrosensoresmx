  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root { --bg:#0E1508; --bg2:#0C1A0A; --cream:#F5EDE0; --olive:#8A9A52; --olive-l:#A6B86A; --tan:#C49A6A; --brown:#7B3F18; }
    html { scroll-behavior:smooth; }
    body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--cream); -webkit-font-smoothing:antialiased; line-height:1.6; }
    a { color:inherit; }
    img { max-width:100%; display:block; }

    /* progress bar */
    .progress { position:fixed; top:0; left:0; height:3px; width:0%; background:linear-gradient(90deg,var(--olive),var(--tan)); z-index:200; transition:width .1s linear; }

    /* NAV */
    .nav { position:sticky; top:0; z-index:100; min-height:66px; display:flex; align-items:center; justify-content:space-between; gap:16px; padding:0 40px; background:rgba(14,21,8,.94); backdrop-filter:blur(20px); border-bottom:1px solid rgba(138,154,82,.16); }
    .nav-l,.nav-r { display:flex; align-items:center; gap:18px; }
    .nav img.logo { height:34px; width:auto; filter:brightness(1.6) saturate(.85); display:block; }
    .nav .back { font-size:13.5px; color:rgba(245,237,224,.6); text-decoration:none; white-space:nowrap; transition:color .2s; }
    .nav .back:hover { color:var(--tan); }
    .lang-pills { display:flex; background:rgba(255,255,255,.05); border-radius:8px; padding:3px; gap:1px; }
    .lpill { background:none; border:none; color:rgba(245,237,224,.45); padding:4px 9px; border-radius:6px; font-size:11px; font-weight:500; font-family:'DM Sans',sans-serif; cursor:pointer; letter-spacing:.04em; white-space:nowrap; }
    .lpill:hover { color:var(--olive); background:rgba(138,154,82,.12); }
    .lpill.on { color:var(--tan); background:rgba(196,154,106,.14); font-weight:700; }

    /* HERO */
    .hero { max-width:860px; margin:0 auto; padding:56px 24px 0; text-align:center; }
    .crumbs { font-size:12.5px; color:rgba(245,237,224,.45); margin-bottom:26px; }
    .crumbs a { color:var(--olive); text-decoration:none; }
    .cat-tag { display:inline-block; font-size:11px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--bg); background:var(--olive); padding:5px 13px; border-radius:20px; margin-bottom:22px; }
    .hero h1 { font-family:'Cormorant Garant',serif; font-size:clamp(34px,5.4vw,56px); font-weight:700; line-height:1.08; letter-spacing:-.01em; }
    .hero .sub { font-size:clamp(17px,2.4vw,21px); color:rgba(245,237,224,.62); max-width:680px; margin:22px auto 0; font-weight:300; line-height:1.55; }
    .meta { display:flex; align-items:center; justify-content:center; gap:18px; flex-wrap:wrap; margin:30px 0 36px; font-size:13.5px; color:rgba(245,237,224,.5); }
    .meta .dot { width:4px; height:4px; border-radius:50%; background:rgba(245,237,224,.3); }
    .meta b { color:var(--cream); font-weight:600; }
    .hero-img { position:relative; width:100%; height:min(46vw,440px); border-radius:20px; overflow:hidden; border:1px solid rgba(138,154,82,.2); box-shadow:0 30px 70px rgba(0,0,0,.5); }
    .hero-cap { font-size:12.5px; color:rgba(245,237,224,.4); margin-top:12px; font-style:italic; }

    /* NOTICE bar (untranslated langs) */
    .notice { max-width:760px; margin:26px auto -6px; padding:13px 20px; background:rgba(196,154,106,.1); border:1px solid rgba(196,154,106,.3); border-radius:12px; font-size:13.5px; color:var(--tan); text-align:center; }
    .notice:empty { display:none; }

    /* ARTICLE BODY */
    .body { max-width:720px; margin:0 auto; padding:48px 24px 40px; }
    .body h2 { font-family:'Cormorant Garant',serif; font-size:clamp(26px,3.6vw,36px); font-weight:700; line-height:1.15; margin:50px 0 8px; color:var(--cream); }
    .body h2 .num { color:var(--olive); font-style:italic; margin-right:10px; }
    .body p { font-size:17.5px; color:rgba(245,237,224,.82); margin:18px 0; line-height:1.72; }
    .body p strong { color:var(--cream); font-weight:600; }
    .body .lead { font-size:21px; line-height:1.6; color:var(--cream); font-weight:300; margin:8px 0 12px; }
    .body .lead strong { font-weight:600; }

    .pull { margin:42px 0; padding:8px 0 8px 30px; border-left:3px solid var(--olive); }
    .pull p { font-family:'Cormorant Garant',serif; font-size:clamp(24px,3.4vw,32px); font-style:italic; line-height:1.32; color:var(--cream); margin:0; }
    .pull .by { font-family:'DM Sans',sans-serif; font-style:normal; font-size:13px; color:var(--olive); margin-top:14px; letter-spacing:.04em; text-transform:uppercase; font-weight:600; }

    /* seed cards */
    .seeds { display:grid; grid-template-columns:repeat(2,1fr); gap:14px; margin:34px 0; }
    .seed { background:rgba(245,237,224,.03); border:1px solid rgba(138,154,82,.18); border-radius:16px; padding:22px 22px 20px; transition:border-color .25s, transform .25s, background .25s; }
    .seed:hover { border-color:rgba(138,154,82,.45); transform:translateY(-3px); background:rgba(138,154,82,.06); }
    .seed .n { font-size:12px; font-weight:700; color:var(--olive); letter-spacing:.08em; }
    .seed .nm { font-family:'Cormorant Garant',serif; font-size:25px; font-weight:700; color:var(--cream); margin:3px 0 12px; }
    .seed .ph-label { font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:rgba(245,237,224,.42); margin-bottom:6px; }
    .seed .ph { font-size:14.5px; color:var(--tan); font-weight:600; }
    .ph-scale { height:7px; border-radius:5px; margin-top:12px; background:linear-gradient(90deg,#C85a3a 0%,#D9A441 30%,#8A9A52 50%,#4a8fb0 75%,#5a5ab0 100%); position:relative; }
    .ph-scale .mark { position:absolute; top:-3px; width:13px; height:13px; border-radius:50%; background:var(--cream); border:2px solid var(--bg); transform:translateX(-50%); box-shadow:0 2px 6px rgba(0,0,0,.5); }

    /* stats */
    .stats { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin:36px 0; }
    .stat { text-align:center; padding:26px 14px; background:linear-gradient(160deg,#15290F,#0C1A0A); border:1px solid rgba(138,154,82,.2); border-radius:16px; }
    .stat .v { font-family:'Cormorant Garant',serif; font-size:38px; font-weight:700; color:var(--olive-l); line-height:1; }
    .stat .l { font-size:12.5px; color:rgba(245,237,224,.55); margin-top:8px; letter-spacing:.02em; }

    /* callout */
    .callout { margin:38px 0; padding:28px 30px; background:rgba(138,154,82,.08); border:1px solid rgba(138,154,82,.28); border-radius:18px; }
    .callout .ct { font-family:'Cormorant Garant',serif; font-size:23px; font-weight:700; color:var(--cream); margin-bottom:14px; display:flex; align-items:center; gap:10px; }
    .callout ul { list-style:none; display:flex; flex-direction:column; gap:11px; }
    .callout li { font-size:15.5px; color:rgba(245,237,224,.78); padding-left:26px; position:relative; line-height:1.5; }
    .callout li::before { content:'✓'; position:absolute; left:0; color:var(--olive); font-weight:700; }
    .callout li strong { color:var(--cream); font-weight:600; }

    /* CTA + author */
    .article-cta { max-width:720px; margin:20px auto 0; padding:0 24px; }
    .article-cta .box { padding:40px 36px; border-radius:20px; background:linear-gradient(150deg,#15290F,#0C1A0A); border:1px solid rgba(138,154,82,.22); text-align:center; }
    .article-cta h3 { font-family:'Cormorant Garant',serif; font-size:30px; font-weight:700; margin-bottom:10px; }
    .article-cta p { color:rgba(245,237,224,.6); font-size:15.5px; margin-bottom:24px; }
    .article-cta .row { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
    .btn-p { display:inline-flex; align-items:center; gap:8px; background:linear-gradient(135deg,#8A9A52,#5C6B3A); color:var(--bg); font-weight:700; font-size:14px; padding:14px 26px; border-radius:11px; text-decoration:none; transition:transform .2s,box-shadow .2s; }
    .btn-p:hover { transform:translateY(-2px); box-shadow:0 12px 28px rgba(138,154,82,.35); }
    .btn-s { display:inline-flex; align-items:center; gap:8px; background:transparent; border:1px solid rgba(245,237,224,.22); color:var(--cream); font-weight:600; font-size:14px; padding:14px 26px; border-radius:11px; text-decoration:none; transition:background .2s; }
    .btn-s:hover { background:rgba(245,237,224,.06); }

    .tags { max-width:720px; margin:40px auto 0; padding:0 24px; display:flex; gap:10px; flex-wrap:wrap; }
    .tags .t { font-size:12.5px; color:rgba(245,237,224,.55); background:rgba(245,237,224,.05); border:1px solid rgba(138,154,82,.16); padding:6px 13px; border-radius:20px; }

    footer { background:#070D04; border-top:1px solid rgba(138,154,82,.1); padding:34px 40px; text-align:center; color:rgba(245,237,224,.4); font-size:13px; margin-top:64px; }
    footer a { color:var(--olive); text-decoration:none; }

    [dir=rtl] .body, [dir=rtl] .hero { text-align:right; }
    [dir=rtl] .pull { border-left:none; border-right:3px solid var(--olive); padding:8px 30px 8px 0; }
    [dir=rtl] .callout li { padding-left:0; padding-right:26px; }
    [dir=rtl] .callout li::before { left:auto; right:0; }
    [dir=rtl] .hero .crumbs, [dir=rtl] .meta { text-align:center; }

    @media (max-width:680px){
      .nav { padding:0 16px; gap:10px; }
      .nav .back { display:none; }
      .lang-pills { overflow-x:auto; }
      .seeds { grid-template-columns:1fr; }
      .stats { grid-template-columns:1fr; }
      .body { padding:36px 20px 30px; }
      .body p, .body .lead { font-size:16.5px; }
    }
  </style>
</head>
<body>

    <div class="hero-img">
      <image-slot id="art-hero" src="../images/blog-avocado-seeds-hero.png" placeholder="Foto de semilla de aguacate" shape="rect" style="position:absolute;inset:0;width:100%;height:100%;"></image-slot>
    </div>

  </header>

    <div class="box">
      <h3 id="ctaH"></h3>
      <p id="ctaP"></p>
      <div class="row">
        <a class="btn-p" href="https://wa.me/524522693414" target="_blank" rel="noopener noreferrer" id="ctaBtnP"></a>
        <a class="btn-s" href="../index.html#crm" id="ctaBtnS"></a>

  <script src="article-aguacate-data.js"></script>
  <script>
  const $ = s => document.querySelector(s);
  function md(s){ return s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>'); }
  function renderBlocks(blocks){
    let h = '';
    for(const b of blocks){
      if(b.t==='lead') h += '<p class="lead">'+md(b.x)+'</p>';
      else if(b.t==='p') h += '<p>'+md(b.x)+'</p>';
      else if(b.t==='h2') h += '<h2>'+(b.n?'<span class="num">'+b.n+'</span>':'')+b.x+'</h2>';
      else if(b.t==='pull') h += '<div class="pull"><p>'+md(b.x)+'</p>'+(b.by?'<div class="by">'+b.by+'</div>':'')+'</div>';
      else if(b.t==='seeds'){
        h += '<div class="seeds">';
        for(const s of b.items){
          h += '<div class="seed"><div class="n">'+s.n+'</div><div class="nm">'+s.nm+'</div><div class="ph-label">'+b.phLabel+'</div><div class="ph">'+s.ph+'</div><div class="ph-scale"><div class="mark" style="left:'+s.pos+'%"></div></div></div>';
        }
        h += '</div>';
      }
      else if(b.t==='stats'){
        h += '<div class="stats">';
        for(const s of b.items) h += '<div class="stat"><div class="v">'+s.v+'</div><div class="l">'+s.l+'</div></div>';
        h += '</div>';
      }
      else if(b.t==='callout'){
        h += '<div class="callout"><div class="ct">'+(b.icon||'')+' '+b.title+'</div><ul>';
        for(const li of b.items) h += '<li>'+md(li)+'</li>';
        h += '</ul></div>';
      }
    }
    return h;
  }
  function render(lang){
    const data = ART[lang] || ART.en;
    const t = data.ui;
    document.documentElement.lang = lang;
    const rtl = lang==='ar';
    document.documentElement.dir = rtl?'rtl':'ltr';
    document.body.dir = rtl?'rtl':'ltr';
    $('#back').textContent = t.back;
    $('#crumbs').innerHTML = '<a href="../index.html">'+t.home+'</a> / <a href="../blog.html">'+t.news+'</a> / '+t.crumb;
    $('#catTag').textContent = data.cat;
    $('#title').textContent = data.title;
    $('#sub').textContent = data.sub;
    $('#metaRow').innerHTML = '<span>'+t.by+' <b>'+data.author+'</b></span><span class="dot"></span><span>'+data.date+'</span><span class="dot"></span><span>'+data.read+'</span>';
    $('#heroCap').textContent = data.heroCap;
    $('#notice').textContent = data.notice || '';
    $('#body').innerHTML = renderBlocks(data.blocks);
    $('#ctaH').textContent = data.ctaH;
    $('#ctaP').textContent = data.ctaP;
    $('#ctaBtnP').textContent = t.waBtn;
    $('#ctaBtnS').textContent = t.quoteBtn;
    $('#tags').innerHTML = data.tags.map(x=>'<span class="t">#'+x+'</span>').join('');
    $('#foot').innerHTML = '© 2025 Agrosensores y Semillas de México · Morelia, Michoacán · <a href="../index.html">'+t.home+'</a>';
    document.querySelectorAll('.lpill').forEach(b=>b.classList.toggle('on', b.dataset.l===lang));
    try{ localStorage.setItem('agro_lang', lang); }catch(e){}
  }
  document.querySelectorAll('.lpill').forEach(b=>b.addEventListener('click',()=>render(b.dataset.l)));
  // progress bar
  window.addEventListener('scroll',()=>{
    const h = document.documentElement.scrollHeight - window.innerHeight;
    $('#prog').style.width = (h>0 ? (window.scrollY/h*100) : 0)+'%';
  },{passive:true});
  let initial='es';
  try{
    const q=new URLSearchParams(location.search).get('lang');
    if(q && ART[q]) initial=q;
    else { const ls=localStorage.getItem('agro_lang'); if(ls && ART[ls]) initial=ls; }
  }catch(e){}
  render(initial);
  </script>
</body>
