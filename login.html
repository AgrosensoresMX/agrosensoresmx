<!DOCTYPE html>
<html lang="en-US">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgrosensoresMX · Access</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--od:#4f5e30;--om:#7a8c4f;--ed:#6b3f1e;--em:#8b5e3c;--sand:#f2e9d8;--white:#fff;--text:#1e1a14;--muted:#6b6350;--brd:rgba(80,65,35,.14);--r:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--od);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:var(--white);border-radius:var(--r);width:100%;max-width:420px;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,0.25)}
.card-top{background:var(--od);padding:28px 32px 24px;text-align:center}
.card-top img{height:48px;width:auto;border-radius:6px;padding:4px 10px;background:#fff;margin-bottom:16px}
.card-top h1{color:#fff;font-size:1.05rem;font-weight:700;letter-spacing:.2px}
.card-top p{color:rgba(255,255,255,.65);font-size:.75rem;margin-top:4px}
.card-body{padding:28px 32px 32px}
.field{margin-bottom:16px}
.field label{display:block;font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
.field input{width:100%;padding:10px 12px;border:1px solid var(--brd);border-radius:8px;font-size:.9rem;font-family:inherit;color:var(--text);transition:.12s}
.field input:focus{outline:2px solid var(--om);border-color:transparent}
.btn-login{width:100%;padding:11px;background:var(--od);color:#fff;border:none;border-radius:8px;font-size:.9rem;font-weight:700;cursor:pointer;transition:.14s;font-family:inherit;margin-top:4px}
.btn-login:hover{background:var(--ed)}
.btn-login:disabled{opacity:.6;cursor:not-allowed}
.error{background:#fdf0ed;border:1px solid #e8a090;border-radius:6px;padding:9px 12px;font-size:.78rem;color:#8b2a1a;margin-bottom:14px;display:none}
.footer-note{text-align:center;font-size:.68rem;color:var(--muted);margin-top:18px;line-height:1.5}
</style>
</head>
<body>
<div class="card">
  <div class="card-top">
    <img id="logoImg" alt="Agrosensores y Semillas de México">
    <h1>Export Quotation System</h1>
    <p>Agrosensores y Semillas de México</p>
  </div>
  <div class="card-body">
    <div class="error" id="errorMsg"></div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="your@email.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-login" id="btnLogin">Sign In</button>
    <div class="footer-note">
      Internal use only · Agrosensores y Semillas de México<br>
      Unauthorized access is prohibited.
    </div>
  </div>
</div>

<script>
const SUPA_URL = 'https://hcwelstbmcpbopjaetdd.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhjd2Vsc3RibWNwYm9wamFldGRkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMzc0NzEsImV4cCI6MjA5NjcxMzQ3MX0.WXFyh1pwNKJiHca-gH8S9vgLMBXnfyGgnH8lOFNRLOg';
const supabase = window.supabase.createClient(SUPA_URL, SUPA_KEY);

// Embed logo as base64 — same file used in quotation tool
// Logo loaded from same directory
document.getElementById('logoImg').src = 'logo.png';

// If already logged in, redirect
supabase.auth.getSession().then(({data:{session}}) => {
  if (session) window.location.href = 'dashboard.html';
});

document.getElementById('btnLogin').addEventListener('click', async () => {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('btnLogin');
  const errEl    = document.getElementById('errorMsg');

  if (!email || !password) {
    showError('Please enter your email and password.');
    return;
  }
  btn.disabled = true;
  btn.textContent = 'Signing in…';
  errEl.style.display = 'none';

  const { error } = await supabase.auth.signInWithPassword({ email, password });
  if (error) {
    showError('Invalid email or password. Please try again.');
    btn.disabled = false;
    btn.textContent = 'Sign In';
  } else {
    window.location.href = 'dashboard.html';
  }
});

// Allow Enter key
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btnLogin').click();
});

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}
</script>
</body>
</html>
